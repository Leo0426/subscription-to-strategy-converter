<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subflow · 订阅转换</title>
    <link rel="stylesheet" href="/static/styles.css?v=24" />
  </head>
  <body class="simple-page">
    <div class="simple-shell">
      <header class="simple-header">
        <span class="simple-brand">Subflow</span>
        <a href="/advanced" class="simple-advanced-link">高级工作台 →</a>
      </header>

      <main class="simple-main">
        <div class="simple-hero">
          <h1>粘贴订阅，一键生成 Mihomo 配置</h1>
          <p>自动添加 AI、开发者分流规则，支持 Clash / V2Ray / Trojan 等格式</p>
        </div>

        <div class="simple-card">
          <label class="simple-label" for="sub-url">机场订阅 URL</label>
          <textarea
            id="sub-url"
            class="simple-textarea"
            placeholder="https://example.com/sub?token=xxx"
            rows="3"
            autofocus
          ></textarea>

          <div class="simple-output" id="simple-output">
            <label class="simple-label" for="result-url">订阅链接（直接导入 Mihomo / Clash Meta）</label>
            <div class="simple-result-row">
              <input id="result-url" class="simple-input" type="url" readonly placeholder="粘贴订阅地址后自动生成" />
              <button id="copy-btn" class="simple-copy-btn" disabled>复制</button>
            </div>
          </div>

          <p class="simple-hint" id="simple-hint"></p>
        </div>
      </main>

      <footer class="simple-footer">
        <a href="/advanced">高级工作台</a>
        <span>·</span>
        <span>target: Mihomo · template: powerfullz</span>
      </footer>
    </div>
    <script src="/static/main.js?v=24"></script>
  </body>
</html>
