# Leo 策略模板
# 由 Subflow 注入订阅节点，并在生成时按地区筛选策略组。

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  proxy-server-nameserver:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  - +.lan
  - +.local
  - time.*.com
  - ntp.*.com
  - +.market.xiaomi.com
  - +.push.apple.com
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
tun:
  enable: false
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  auto-route: true
  auto-detect-interface: true
proxy-groups:
- name: 默认代理
  type: select
  proxies:
  - 自动选择
  - 故障转移
  - 香港自动
  - 台湾自动
  - 日本自动
  - 新加坡自动
  - 美国自动
  - 韩国自动
  - 欧洲自动
  - 手动选择
  - DIRECT
- name: 自动选择
  type: url-test
  include-all: true
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 故障转移
  type: fallback
  include-all: true
  url: https://www.gstatic.com/generate_204
  interval: 300
- name: 手动选择
  type: select
  include-all: true
- name: 香港自动
  type: url-test
  include-all: true
  filter: (?i)(香港|🇭🇰|Hong Kong|(^|[^A-Za-z])(HK|HKG)([^A-Za-z]|$))
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 台湾自动
  type: url-test
  include-all: true
  filter: (?i)(台湾|台北|台中|🇹🇼|Taiwan|(^|[^A-Za-z])(TW|TPE)([^A-Za-z]|$))
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 日本自动
  type: url-test
  include-all: true
  filter: (?i)(日本|东京|大阪|🇯🇵|Japan|(^|[^A-Za-z])(JP|NRT|HND)([^A-Za-z]|$))
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 新加坡自动
  type: url-test
  include-all: true
  filter: (?i)(新加坡|狮城|🇸🇬|Singapore|(^|[^A-Za-z])(SG|SIN)([^A-Za-z]|$))
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 美国自动
  type: url-test
  include-all: true
  filter: (?i)(美国|美國|🇺🇸|United States|(^|[^A-Za-z])(US|USA|LAX|SJC|SFO)([^A-Za-z]|$))
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 韩国自动
  type: url-test
  include-all: true
  filter: (?i)(韩国|韓國|首尔|首爾|🇰🇷|Korea|(^|[^A-Za-z])KR([^A-Za-z]|$))
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: 欧洲自动
  type: url-test
  include-all: true
  filter: (?i)(英国|法國|法国|德国|德國|荷兰|荷蘭|瑞士|欧洲|歐洲|🇬🇧|🇫🇷|🇩🇪|(^|[^A-Za-z])(UK|GB|DE|FR|EU)([^A-Za-z]|$))
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
- name: AI 服务
  type: select
  proxies:
  - 美国自动
  - 默认代理
  - 日本自动
  - 新加坡自动
  - 手动选择
- name: 流媒体
  type: select
  proxies: &id001
  - 默认代理
  - 香港自动
  - 台湾自动
  - 日本自动
  - 新加坡自动
  - 美国自动
  - 韩国自动
  - 欧洲自动
  - 自动选择
  - 故障转移
  - 手动选择
  - DIRECT
- name: 社交通讯
  type: select
  proxies: *id001
- name: 游戏服务
