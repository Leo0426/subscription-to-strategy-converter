  - 新加坡自动
  - 日本自动
- name: Google
  type: select
  proxies:
  - 默认代理
  - 美国自动
  - 新加坡自动
  - 日本自动
- name: Microsoft
  type: select
  proxies:
  - DIRECT
  - 默认代理
