services:
  subflow:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      SUBFLOW_DB_PATH: /app/data/subflow.db
      UV_PROJECT_ENVIRONMENT: /tmp/subflow-venv
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
