services:
  subflow:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      SUBCONVERTER_BASE_URL: http://subconverter:25500
      SUBFLOW_DB_PATH: /app/data/subflow.db
      UV_PROJECT_ENVIRONMENT: /tmp/subflow-venv
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - subconverter

  subconverter:
    image: tindy2013/subconverter:latest
    ports:
      - "25500:25500"
